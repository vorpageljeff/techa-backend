app = "techa-backend"
primary_region = "gru"

[build]
  dockerfile = "docker/Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  ENABLE_PIPELINE = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
