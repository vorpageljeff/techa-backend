services:
  - type: web
    name: techa-backend
    runtime: docker
    plan: free
    region: virginia
    branch: main
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10000"
      - key: APP_NAME
        value: "Techa"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "10000"
      - key: ENABLE_PIPELINE
        value: "false"
      - key: TILES_STORAGE_PATH
        value: /tmp/techa/tiles
      - key: RASTER_STORAGE_PATH
        value: /tmp/techa/rasters
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: techa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: techa-redis
          property: connectionString
      - key: COPERNICUS_USER
        sync: false
      - key: COPERNICUS_PASSWORD
        sync: false
      - key: COPERNICUS_CLIENT_ID
        sync: false
      - key: COPERNICUS_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Techá - InnovAgro"

  - type: keyvalue
    name: techa-redis
    plan: free
    region: virginia
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: techa-db
    plan: free
    region: virginia
    postgresMajorVersion: "15"
    databaseName: techa_db
    user: techa_user
